name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pms_user
          POSTGRES_PASSWORD: pms_password
          POSTGRES_DB: pms_database_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # 1. Install dependencies
      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install client dependencies
        run: npm ci --prefix client

      # 2. Type Check
      - name: Type check server
        run: npm run type-check --prefix server

      - name: Type check client
        run: npm run type-check --prefix client

      # 3. Lint
      - name: Lint client
        run: npm run lint --prefix client

      # Setup environment variables for database migration & tests
      - name: Set test environment variables
        run: |
          echo "DATABASE_URL=postgresql://pms_user:pms_password@localhost:5432/pms_database_test?schema=public" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret_12345" >> $GITHUB_ENV
          echo "JWT_EXPIRES_IN=1h" >> $GITHUB_ENV
          echo "PORT=5000" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      # Run Prisma Generate
      - name: Generate Prisma Client
        run: npm run db:generate --prefix server

      # Run migrations against Postgres service
      - name: Deploy Database Migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      # 4. Run backend tests
      - name: Run backend tests
        run: npm test --prefix server

      # 5. Run frontend tests
      - name: Run frontend tests
        run: npm test --prefix client

      # 6. Build backend
      - name: Build backend
        run: npm run build --prefix server

      # 7. Build frontend
      - name: Build frontend
        run: npm run build --prefix client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
